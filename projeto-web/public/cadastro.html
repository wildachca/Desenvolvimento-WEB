<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Início</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background:linear-gradient(135deg,#ff5edc,#7b4dff);
        }
        h1 {
            color: white;
        }
        a {
            display: inline-block;
            margin: 20px;
            padding: 15px 25px;
            text-decoration: none;
            color: white;
            background-color: #17071b;
            border-radius: 8px;
            transition: background 0.3s;
        }
        a:hover {
            background-color: #d838d0;
        }
    </style>
</head>
<body>
    <h1>Cadastro de Usuário</h1>

    <input id="nome" placeholder="Nome">
    <input id="idade" type="number" placeholder="Idade">
    <input id="email" placeholder="Email">

    <button onclick="cadastrar()">Cadastrar</button>

    <a href="lista.html">Ver lista</a>

<script src="cadastro.js"></script>
</body>
</html>
