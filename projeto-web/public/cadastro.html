<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:linear-gradient(135deg,#ff5edc,#7b4dff);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h1 {
            color: white;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #943ee4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #ca2ea3;
        }
        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #000000;
        }
    </style>
</head>
<body>
    <h1>Cadastro de Usuário</h1>
    <form id="formCadastro">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="number" id="idade" placeholder="Idade" required>
        <button type="submit">Cadastrar</button>
    </form>
    <a href="index.html">Voltar</a>

    <script src="js/cadastro.js"></script>
</body>
</html>
