<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:linear-gradient(135deg,#ff5edc,#7b4dff);
            padding: 50px;
            text-align: center;
        }
        h1 {
            color: white;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            margin: 10px auto;
            padding: 15px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-weight: bold;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #000000;
        }
    </style>
</head>
<body>
    <h1>Lista de Usuários</h1>
    <ul id="lista"></ul>
    <a href="index.html">Voltar</a>

    <script src="js/lista.js"></script>
</body>
</html>
