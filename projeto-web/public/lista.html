<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuários</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(135deg,#ff5edc,#7b4dff);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #6a0dad;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.8rem;
        }

        main {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background-color: white;
            margin-bottom: 10px;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        li:hover {
            transform: scale(1.02);
        }

        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #e60000;
        }

        .empty {
            text-align: center;
            color: #555;
            font-style: italic;
            margin-top: 30px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #6a0dad;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        Lista de Usuários
    </header>

    <main>
        <ul id="lista">
            
        </ul>

        <p class="empty" id="emptyMsg" style="display:none;">
            Nenhum usuário cadastrado.
        </p>

        <a href="cadastro.html">Voltar ao Cadastro</a>
    </main>

    <script src="js/lista.js"></script>
</body>
</html>
